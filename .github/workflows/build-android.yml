name: Build Android APK

'on':
  push:
    branches: [main, master, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug/release)'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android-module

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.0.12077973" \
            --sdk_root=$ANDROID_HOME 2>&1 | tail -5 || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Determine build type
        id: build_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.build_type }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "type=release" >> $GITHUB_OUTPUT
          else
            echo "type=debug" >> $GITHUB_OUTPUT
          fi

      - name: Decode keystore (if provided)
        id: keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "path=keystore.jks" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build APK
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          BUILD_TYPE: ${{ steps.build_type.outputs.type }}
        run: |
          echo "=== Build environment ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          java -version 2>&1
          ls -la gradle/wrapper/
          echo ""
          if [ "$BUILD_TYPE" = "release" ] && [ "${{ steps.keystore.outputs.exists }}" = "true" ]; then
            ./gradlew assembleRelease --info --stacktrace 2>&1
          elif [ "$BUILD_TYPE" = "release" ] && [ "${{ steps.keystore.outputs.exists }}" = "false" ]; then
            echo "No keystore - building debug"
            ./gradlew assembleDebug --info --stacktrace 2>&1
          else
            ./gradlew assembleDebug --info --stacktrace 2>&1
          fi

      - name: Locate APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" | head -1)
          echo "APK is at: $APK"
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "name=$(basename $APK)" >> $GITHUB_OUTPUT

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: wechat-observatory-${{ steps.build_type.outputs.type }}-${{ github.sha }}
          path: android-module/${{ steps.apk.outputs.path }}

      # --- Release (tag push only) ---
      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/v')
        id: release_notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1 || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            git log "$PREV_TAG"..HEAD --oneline --no-decorate >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "notes=Initial release" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: WeChat Observatory ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.notes }}
          files: android-module/${{ steps.apk.outputs.path }}
          generate_release_notes: true
